  <text x="25" y="365" class="note">MIDI Rev D enclosure body: 3.0 mm 5052-H32 aluminium. Finished floor 210 x 165 with 65 mm folded side walls.</text>
  <text x="25" y="377" class="note">This replaces the open Rev C plate route with a covered aluminium box around the full five-holder MIDI bank.</text>
  <text x="25" y="389" class="note">Output side has five grommet pilot holes: four 16 mm holes plus one far-side 28 mm hole for the output that carries two power cables.</text>
  <text x="25" y="401" class="note">Input/bus side has one 20 mm grommet pilot hole aligned to the second-from-last holder, where the cutoff-switched feed lands on the bus bar.</text>
  <text x="25" y="413" class="note">Open pilot holes only as far as needed for the final cable and rubber grommet OD; deburr both sides and fit edge-safe grommets before wiring.</text>
  <text x="25" y="425" class="note">Hinge holes are on the input/bus side; latch holes are on the output side so the lid can open without disturbing the branch wires.</text>
</svg>
