  <text x="25" y="155" class="note">Holder subplate: 5.0 mm HDPE, ABS, G10, or phenolic. This board keeps the MIDI holders insulated from the aluminium enclosure.</text>
  <text x="25" y="167" class="note">Ten holder fixing holes reuse the measured linked-holder pattern from Rev C: about 20.2 mm pitch, 44 mm row separation, and 10 mm row stagger.</text>
  <text x="25" y="179" class="note">The six larger holes mount the subplate to the enclosure floor on 10-12 mm insulated standoffs.</text>
  <text x="25" y="191" class="note">The second-from-last holder is the planned power input/bus-bar feed position; the opposite side carries five fused outputs.</text>
</svg>
