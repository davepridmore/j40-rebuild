  <text x="25" y="170" class="note">Rear insulator panel: 3.0 mm ABS, HDPE, or polypropylene. Do not make this part from bare metal.</text><text x="25" y="182" class="note">One larger grommet hole is for the single bus-bar feed into the linked MIDI bank.</text><text x="25" y="194" class="note">Five smaller grommet holes are for the separated fused branch outputs leaving the module.</text><text x="25" y="206" class="note">Grommet-hole diameters are provisional in Rev A and can be opened up to match the final cable and grommet sizes.</text>
</svg>
