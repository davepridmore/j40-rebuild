  <text x="25" y="250" class="note">5-way MIDI-only module box: 3.0 mm 5052-H32 aluminium. Finished face 260 x 140. Flanges 20 mm back.</text><text x="25" y="262" class="note">This module is for the 5 linked bus-bar MIDI holders only; breaker/cutoff is intentionally omitted from this variant.</text><text x="25" y="274" class="note">Six face holes mount a separate non-conductive holder board. Final fuse-holder ear holes belong in that board after measurement confirmation.</text><text x="25" y="286" class="note">Vehicle-side pickup slots remain site-fit because the repaired tray and side structure are not yet fixed.</text>
