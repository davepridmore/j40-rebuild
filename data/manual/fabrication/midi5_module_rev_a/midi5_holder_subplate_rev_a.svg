  <text x="25" y="170" class="note">Holder subplate: 5.0 mm HDPE, ABS, G10, or phenolic. This is the sacrificial non-conductive board for the five linked holders.</text><text x="25" y="182" class="note">A provisional 5-position slot field is included: two adjustable slots per holder location, sized for site-fit before the exact ear pitch is confirmed.</text><text x="25" y="194" class="note">Replace the provisional slot field with the measured final ear-hole pattern in Rev B once the linked-holder assembly is measured.</text><text x="25" y="206" class="note">Using an insulating board avoids mounting the modular holders directly to aluminium and makes later drilling/replacement easier.</text>
