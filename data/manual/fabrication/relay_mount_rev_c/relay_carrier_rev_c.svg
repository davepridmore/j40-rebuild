  <text x="25" y="325" class="note">Relay carrier: 3.0 mm 5052-H32 aluminium. Finished face 320 x 220 with 20 mm side/bottom returns and 15 mm top return.</text><text x="25" y="337" class="note">Relay-box mount pattern remains slotted on purpose, even with the published housing size confirmed.</text><text x="25" y="349" class="note">Use 5-10 mm stand-off spacing between the relay box and the rear guard zone so the loom is not crushed against the carrier.</text><text x="25" y="361" class="note">Vehicle-side mount slots remain site-fit to suit the repaired battery/tray structure and inner-wing support.</text>
