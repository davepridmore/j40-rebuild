  <text x="25" y="230" class="note">5-way MIDI-only module box: 3.0 mm 5052-H32 aluminium. Finished face 180 x 120. Flanges 20 mm back.</text><text x="25" y="242" class="note">This Rev B shell is tightened around the measured five-holder pack; breaker/cutoff remains a separate part elsewhere.</text><text x="25" y="254" class="note">Six face holes mount the non-conductive holder subplate on stand-offs.</text><text x="25" y="266" class="note">Vehicle-side pickup slots remain slotted for site-fit to the repaired inner-wing / tray structure.</text>
