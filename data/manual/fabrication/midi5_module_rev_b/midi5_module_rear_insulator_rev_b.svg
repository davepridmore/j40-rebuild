  <text x="25" y="160" class="note">Rear insulator panel: 3.0 mm ABS, HDPE, or polypropylene. Do not make this part from bare metal.</text><text x="25" y="172" class="note">Five 12 mm grommet pilot holes align with the five fused branch positions behind the linked holder row.</text><text x="25" y="184" class="note">One 20 mm grommet pilot hole is reserved for the single bus-bar feed into the linked MIDI bank.</text><text x="25" y="196" class="note">Hole diameters can still be opened up if your final cable and grommet combination needs more room.</text>
