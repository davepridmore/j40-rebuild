  <text x="25" y="155" class="note">Holder subplate: 5.0 mm HDPE, ABS, G10, or phenolic. This board carries the five linked MIDI holders.</text><text x="25" y="167" class="note">Ten holder fixing holes are based on the tape-photo measurements: five positions on about 20 mm pitch, with about 44 mm ear-row separation.</text><text x="25" y="179" class="note">The left and right ear rows are staggered by about 10 mm, matching the offset visible in the linked-holder photos.</text><text x="25" y="191" class="note">The fuse-holder ears are already slotted, so the board can use round 4.5 mm fixing holes.</text><text x="25" y="203" class="note">If your measured final pitch differs by more than 1 mm, update this board only; the metal shell can stay unchanged.</text>
</svg>
