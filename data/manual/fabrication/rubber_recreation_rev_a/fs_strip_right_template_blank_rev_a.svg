  <text x="24" y="106" class="note">This is a stock and quote blank using 165 mm trace length and 38-42 mm working width.</text><text x="24" y="116" class="note">Final strip outline and hole centres must be traced from the physical rubber and metal carrier before cutting.</text><text x="24" y="126" class="note">Punch M10 clearance holes or 11 x 16 slots only where the carrier confirms them. Do not copy torn rubber holes.</text><text x="24" y="136" class="note">If bonded to metal, blast/degrease/prime the carrier and clamp flat through cure.</text>
