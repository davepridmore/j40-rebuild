<svg xmlns="http://www.w3.org/2000/svg" width="112mm" height="184mm" viewBox="0 0 112 184">
  <style>
    .cut { fill: none; stroke: #111; stroke-width: 0.5; }
    .drill { fill: none; stroke: #111; stroke-width: 0.5; }
    .relief { fill: none; stroke: #111; stroke-width: 0.5; }
    .form { fill: none; stroke: #0b5fff; stroke-width: 0.4; stroke-dasharray: 4 3; }
    .mark { fill: none; stroke: #8a5a00; stroke-width: 0.4; stroke-dasharray: 3 2; }
    .template { fill: none; stroke: #7a1f8a; stroke-width: 0.45; stroke-dasharray: 5 3; }
    .center { stroke: #777; stroke-width: 0.25; stroke-dasharray: 2 2; }
    .title { font: 700 7px monospace; fill: #111; }
    .note { font: 4.8px monospace; fill: #111; }
  </style>
  <text x="24" y="14" class="title">BM-CUP small body-mount cup washer | qty 10 working basis | units: mm</text>
  <g transform="translate(24,24)">
  <circle class="cut" cx="32" cy="32" r="32" /><circle class="drill" cx="32" cy="32" r="5.5" /><circle class="form" cx="32" cy="32" r="23" /><line class="center" x1="32" y1="0" x2="32" y2="64" /><line class="center" x1="0" y1="32" x2="64" y2="32" />
  </g>
  <text x="24" y="130" class="note">M10 clearance hole is 11 mm through. The 46 mm circle is the register/dish forming line.</text><text x="24" y="140" class="note">Dish/register depth target is 2-3 mm after forming. Cup must seat the rubber without rocking.</text><text x="24" y="150" class="note">Reuse original cups only if flat, not thinned, and not cracked. Otherwise form new cups from these blanks.</text><text x="24" y="160" class="note">Deburr, plate/prime, and trial stack with the rubber cushion and sleeve before body installation.</text>
</svg>
