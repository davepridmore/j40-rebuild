  <text x="24" y="152" class="note">Toyota 90917-08004 / 17572-92000 is a reference shape only. This replaces the earlier generic ring/strap placeholders.</text><text x="24" y="162" class="note">Nominal 2D control: 48 mm wide x 86 mm high; lower rubber bulb R24 centred at X24 Y24; top mounting lug on centreline.</text><text x="24" y="172" class="note">Mounting hole: diameter 9 at X24 Y73. Hanger slot: 16 x 22 capsule centred at X24 Y29. Raised boss/recess mark: 36 x 42 capsule.</text><text x="24" y="182" class="note">Finished rubber body thickness target 22 mm unless the bought/genuine sample proves another value. Reproduce any bonded/internal metal reinforcement.</text>
