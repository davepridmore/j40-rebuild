<svg xmlns="http://www.w3.org/2000/svg" width="126mm" height="198mm" viewBox="0 0 126 198">
  <style>
    .cut { fill: none; stroke: #111; stroke-width: 0.5; }
    .drill { fill: none; stroke: #111; stroke-width: 0.5; }
    .relief { fill: none; stroke: #111; stroke-width: 0.5; }
    .form { fill: none; stroke: #0b5fff; stroke-width: 0.4; stroke-dasharray: 4 3; }
    .mark { fill: none; stroke: #8a5a00; stroke-width: 0.4; stroke-dasharray: 3 2; }
    .template { fill: none; stroke: #7a1f8a; stroke-width: 0.45; stroke-dasharray: 5 3; }
    .center { stroke: #777; stroke-width: 0.25; stroke-dasharray: 2 2; }
    .title { font: 700 7px monospace; fill: #111; }
    .note { font: 4.8px monospace; fill: #111; }
  </style>
  <text x="24" y="14" class="title">BM-CUP large body-mount cup washer | qty 2 working basis | units: mm</text>
  <g transform="translate(24,24)">
  <circle class="cut" cx="39" cy="39" r="39" /><circle class="drill" cx="39" cy="39" r="5.5" /><circle class="form" cx="39" cy="39" r="23" /><line class="center" x1="39" y1="0" x2="39" y2="78" /><line class="center" x1="0" y1="39" x2="78" y2="39" />
  </g>
  <text x="24" y="144" class="note">M10 clearance hole is 11 mm through. The 46 mm circle is the register/dish forming line.</text><text x="24" y="154" class="note">Dish/register depth target is 2-3 mm after forming. Cup must seat the rubber without rocking.</text><text x="24" y="164" class="note">Reuse original cups only if flat, not thinned, and not cracked. Otherwise form new cups from these blanks.</text><text x="24" y="174" class="note">Deburr, plate/prime, and trial stack with the rubber cushion and sleeve before body installation.</text>
</svg>
