<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">J40 bump stop vehicle measurement control</title>
  <desc id="desc">Measurement diagram for fabricating J40 bump stops from vehicle bracket and axle strike pad measurements.</desc>
  <rect width="900" height="520" fill="#f7f7f4"/>
  <style>
    .label { font: 15px Arial, sans-serif; fill: #222; }
    .small { font: 12px Arial, sans-serif; fill: #333; }
    .title { font: 700 22px Arial, sans-serif; fill: #111; }
    .part { fill: #2f3136; stroke: #111; stroke-width: 2; }
    .rubber { fill: #111; stroke: #000; stroke-width: 2; }
    .steel { fill: #8d9297; stroke: #333; stroke-width: 2; }
    .pad { fill: #b9c4ca; stroke: #333; stroke-width: 2; }
    .dim { stroke: #c43a31; stroke-width: 2; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
    .guide { stroke: #666; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
    .axis { stroke: #2364aa; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c43a31"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2364aa"/>
    </marker>
  </defs>

  <text x="34" y="42" class="title">Bump Stop Fabrication Control - Measure The Vehicle, Not The Decayed Rubber</text>

  <text x="58" y="88" class="label">Side view</text>
  <rect x="84" y="115" width="210" height="30" rx="3" class="steel"/>
  <path d="M120 145 L260 145 L232 295 L148 295 Z" class="rubber"/>
  <rect x="128" y="295" width="124" height="36" rx="4" class="part"/>
  <rect x="92" y="380" width="194" height="34" rx="5" class="pad"/>
  <line x1="84" y1="145" x2="294" y2="145" class="guide"/>
  <line x1="92" y1="380" x2="286" y2="380" class="guide"/>
  <path d="M318 145 L318 295" class="dim"/>
  <text x="330" y="226" class="label">H</text>
  <text x="330" y="248" class="small">70 mm: 48304-60010</text>
  <text x="330" y="264" class="small">60 mm: 48304-60020</text>
  <path d="M300 331 L300 380" class="dim"/>
  <text x="318" y="359" class="label">G</text>
  <text x="318" y="378" class="small">loaded gap</text>
  <line x1="190" y1="295" x2="190" y2="380" class="axis"/>
  <text x="203" y="350" class="small">strike-pad centreline</text>

  <text x="496" y="88" class="label">Plan view at bracket</text>
  <rect x="500" y="130" width="282" height="136" rx="8" class="steel"/>
  <rect x="535" y="160" width="212" height="76" rx="9" class="rubber"/>
  <circle cx="555" cy="198" r="13" fill="#f7f7f4" stroke="#333" stroke-width="2"/>
  <circle cx="727" cy="198" r="13" fill="#f7f7f4" stroke="#333" stroke-width="2"/>
  <path d="M555 105 L727 105" class="dim"/>
  <text x="620" y="96" class="label">P</text>
  <text x="592" y="286" class="small">P = bolt/stud pitch from bracket</text>
  <path d="M500 288 L782 288" class="dim"/>
  <text x="633" y="313" class="label">BL</text>
  <path d="M805 130 L805 266" class="dim"/>
  <text x="819" y="204" class="label">BW</text>

  <rect x="54" y="440" width="792" height="48" rx="6" fill="#ffffff" stroke="#d5d2ca"/>
  <text x="72" y="463" class="small">Release values: BL/BW/P/D/X-Y/G/F come from cleaned brackets and axle strike pads. Height H: 70 +/-1 mm for BUMP-60010 long stops, 60 +/-1 mm for BUMP-60020 right front.</text>
  <text x="72" y="481" class="small">First article must seat flat, contact the strike pad within +/-5 mm, and engage before shock, tyre, spring, brake hose, or metal-to-metal limits.</text>
</svg>
