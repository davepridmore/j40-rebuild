  <text x="25" y="155" class="note">Holder subplate: 5.0 mm HDPE, ABS, G10, or phenolic. This board carries the five linked MIDI holders.</text><text x="25" y="167" class="note">Ten holder fixing holes are photo-derived from your measured linked-holder pack: about 20.2 mm pitch, about 44 mm row separation, about 10 mm row stagger.</text><text x="25" y="179" class="note">The six larger holes are for the standoffs that mount this board to the aluminium plate.</text><text x="25" y="191" class="note">Because the holder ears are already slotted, these can stay as round holes on the board.</text>
