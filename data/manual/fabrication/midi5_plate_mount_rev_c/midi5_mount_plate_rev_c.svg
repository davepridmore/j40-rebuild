  <text x="25" y="220" class="note">Open mount plate: 3.0 mm 5052-H32 aluminium. No rear box. This is intentional so the MIDI cables can leave in-plane without a forced rearward bend.</text><text x="25" y="232" class="note">Use 10-12 mm nylon or aluminium spacers between this plate and the holder subplate.</text><text x="25" y="244" class="note">The small 6.5 mm holes near the cable sides are for optional P-clips or saddle clamps to support heavy cables after they leave the holders.</text><text x="25" y="256" class="note">Corner mount slots remain site-fit because the truck-side support structure is still being repaired and located.</text>
