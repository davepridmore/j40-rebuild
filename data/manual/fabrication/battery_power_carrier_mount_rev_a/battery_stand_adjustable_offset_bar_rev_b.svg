  <text x="25" y="130" class="note">Adjustable body-side offset bar: 360 x 60 x 4.0 mm mild steel. Make two mirrored bars unless the mock-up proves one central bar and gussets are stiffer.</text>
  <text x="25" y="142" class="note">This bar bolts from the formed chassis saddle/upright bridge toward the body/wing-side battery pocket so the tray/access-ladder offset can be configured.</text>
  <text x="25" y="154" class="note">Use the slotted fields to set the final body-side offset after the battery, relay Rev D base, MIDI Rev D enclosure, cutoff, bonnet, steering, and hose clearances are mocked.</text>
  <text x="25" y="166" class="note">Initial target is about 190 mm body/wing-side offset from the chassis pickup centreline, with 160-230 mm adjustment retained before final drilling.</text>
