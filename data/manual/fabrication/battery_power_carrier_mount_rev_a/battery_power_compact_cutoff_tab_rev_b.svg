  <text x="25" y="180" class="note">Compact cutoff tab/guard: 170 x 110 x 2.0-3.0 mm aluminium or plastic; place independently in the most accessible front/top cavity.</text><text x="25" y="192" class="note">Open the switch hole only after the actual switch body, key/knob sweep, terminal studs, and cable-lug depth are measured.</text><text x="25" y="204" class="note">Guard must not trap water, block emergency access, or sit where the bonnet or battery terminal service envelope can contact it.</text>
