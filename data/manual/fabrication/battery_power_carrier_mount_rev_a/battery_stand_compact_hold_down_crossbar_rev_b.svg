  <text x="25" y="108" class="note">Compact battery hold-down crossbar: 340 x 38 x 3.0 mm mild steel or stainless. Length and slots cover the standard N70/27-class battery envelope but remain template values until the actual battery is measured.</text><text x="25" y="120" class="note">Use J-bolts or vertical rods that cannot touch battery terminals. Add insulated caps where needed.</text><text x="25" y="132" class="note">The crossbar is a service-removable restraint; the battery must lift out vertically after the crossbar and rods are removed.</text><text x="25" y="144" class="note">Do not over-tighten against a plastic battery case; retain the battery without distorting it.</text>
