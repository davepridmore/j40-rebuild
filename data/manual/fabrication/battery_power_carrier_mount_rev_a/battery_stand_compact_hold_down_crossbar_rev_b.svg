  <text x="25" y="108" class="note">Compact battery hold-down crossbar: 315 x 38 x 3.0 mm mild steel or stainless. Length and slots are template values until the actual battery is measured.</text><text x="25" y="120" class="note">Use J-bolts or vertical rods that cannot touch battery terminals. Add insulated caps where needed.</text><text x="25" y="132" class="note">Do not over-tighten against a plastic battery case; retain the battery without distorting it.</text>
