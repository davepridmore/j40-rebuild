  <text x="25" y="190" class="note">Compact front/radiator-side service cassette spine: 325 x 120 x 3.0 mm mild steel. This supersedes the earlier large side/backplane route.</text><text x="25" y="202" class="note">The Relay Rev C folded aluminium tray mounts low on this front face so its 320 x 220 face stays inside the battery width envelope as far as practical.</text><text x="25" y="214" class="note">MIDI Rev C stays as the known open 190 x 150 plate/subplate, but moves to a shallow top-front shelf/tab rather than the inboard engine side.</text><text x="25" y="226" class="note">The folded cutoff base/guard moves to the top/front accessible corner, with lips bent upward around the switch/terminal side rather than downward as hidden stiffeners.</text><text x="25" y="238" class="note">Keep the inboard engine/LHD steering side as a keep-clear/service envelope except for protected cable clips. Do not cut final holes until the battery-cavity map proves radiator, hose, steering, bonnet, and cable-bend clearance.</text>
</svg>
