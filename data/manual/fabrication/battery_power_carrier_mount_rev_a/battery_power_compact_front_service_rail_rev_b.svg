  <text x="25" y="315" class="note">Raised front/radiator-side service ladder: 325 x 245 x 3.0 mm mild steel. This supersedes the earlier low relay cassette and large side/backplane routes.</text><text x="25" y="327" class="note">The Relay Rev C folded aluminium tray mounts in the upper/front serviceable field, with the flat plastic rear guard/underlay between the relay box and the metal tray.</text><text x="25" y="339" class="note">MIDI Rev C stays as the known open 190 x 150 plate/subplate on a separated front/top shelf zone rather than the inboard engine side.</text><text x="25" y="351" class="note">The folded cutoff base/guard stays top/front accessible, with direct protected cable branches from cutoff output to both the relay feed and the MIDI common feed.</text><text x="25" y="363" class="note">Keep at least a 50 mm cable gutter around the relay loom exit and the cutoff/MIDI lugs. Do not cut final holes until the battery-cavity map proves radiator, hose, steering, bonnet, tool, and cable-bend clearance.</text>
</svg>
