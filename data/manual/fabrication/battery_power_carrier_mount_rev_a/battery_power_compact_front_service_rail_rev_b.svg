  <text x="25" y="160" class="note">Compact front service rail: 340 x 90 x 3.0 mm mild steel. This replaces the earlier large one-piece backplane.</text><text x="25" y="172" class="note">Use the folded aluminium relay carrier as its own tray; this steel rail only provides a compact vehicle-side pickup/brace if the front cavity map proves room.</text><text x="25" y="184" class="note">MIDI Rev C remains its own open 190 x 150 plate/subplate assembly; mount it on a small measured bracket or rails, not on a shared large backplane.</text><text x="25" y="196" class="note">Cutoff mounts on its own compact tab so it can be placed at the most accessible front/top position after cavity mapping.</text><text x="25" y="208" class="note">Do not cut final holes until the battery-cavity map proves the front/radiator-side volume, cable bend radius, and LHD clearance.</text>
</svg>
