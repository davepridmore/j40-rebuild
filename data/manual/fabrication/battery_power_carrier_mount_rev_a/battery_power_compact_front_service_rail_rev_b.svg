  <text x="25" y="355" class="note">Raised front/radiator-side access ladder: 500 x 285 x 3.0 mm mild steel. This supersedes the narrower Rev D service ladder because the relay cover and cable exits were still too crowded.</text><text x="25" y="367" class="note">The Relay Rev C folded aluminium tray mounts on the outboard/access edge of this ladder, with the covered relay box face reachable without lifting the battery and the flat plastic rear guard/underlay between the relay box and the metal tray.</text><text x="25" y="379" class="note">MIDI Rev C stays as the known open 190 x 150 plate/subplate on a separated top/front shelf zone, with one common feed entering one side and five heavy output cables leaving the opposite side.</text><text x="25" y="391" class="note">The folded cutoff base/guard stays top/front accessible, with direct protected cable branches from cutoff output to both the covered relay feed and the MIDI common feed.</text><text x="25" y="403" class="note">Keep at least an 80 mm cable fanout/gutter around the relay loom exit, cutoff lugs, MIDI common feed, and five MIDI output lugs. Do not cut final holes until the battery-cavity map proves radiator, hose, steering, bonnet, tool, and cable-bend clearance.</text>
</svg>
