  <text x="25" y="335" class="note">Compact battery stand top tray: 315 x 265 x 3.0 mm mild steel tray/deck around the 275 x 230 mm battery datum with service allowance.</text><text x="25" y="347" class="note">Electrical equipment uses the raised front/radiator-side service ladder: Relay Rev C in the upper service field, MIDI Rev C on a separated front/top shelf, and cutoff on the top/front tab with direct feeds to both relay and MIDI. Do not use tray skin or the engine-side gap as a large backplane.</text><text x="25" y="359" class="note">Final battery footprint, terminal side, clamp path, bonnet clearance, front-cavity clearance, and LHD steering-side clearance are vehicle-measurement holds.</text><text x="25" y="371" class="note">Add an acid-resistant battery mat after paint; do not allow battery case or terminals to touch live studs or sharp steel edges.</text>
</svg>
