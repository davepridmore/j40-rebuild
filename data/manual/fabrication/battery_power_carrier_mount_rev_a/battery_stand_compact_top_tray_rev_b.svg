  <text x="25" y="335" class="note">Compact battery stand top tray: 340 x 265 x 3.0 mm mild steel tray/deck around a standard N70/27-class battery envelope up to 318 x 180 x 230 mm with service allowance.</text><text x="25" y="347" class="note">The battery must be clamped by a removable top crossbar and J-rods/vertical rods outside the terminal path. Remove the hold-down before lifting the battery vertically out of the tray.</text><text x="25" y="359" class="note">Add low end/side stops or a formed edge so the battery cannot slide, but keep them low enough that the case can still be lifted out when the hold-down is removed.</text><text x="25" y="371" class="note">Electrical equipment uses the raised front/radiator-side access ladder: Relay Rev C rotated 90 degrees on the outboard/access edge, MIDI Rev C at the battery leading-edge datum, and the cutoff/kill switch beside the MIDI shelf rather than after the fuse outputs. Route battery positive into the cutoff first, then split the cutoff output to the relay and MIDI inputs. Do not use tray skin or the engine-side gap as a large backplane.</text><text x="25" y="383" class="note">Final battery footprint, central terminal positions/orientation, clamp path, bonnet clearance, front-cavity clearance, and LHD steering-side clearance are vehicle-measurement holds.</text><text x="25" y="395" class="note">Add an acid-resistant battery mat after paint; do not allow battery case or terminals to touch live studs or sharp steel edges.</text>
</svg>
