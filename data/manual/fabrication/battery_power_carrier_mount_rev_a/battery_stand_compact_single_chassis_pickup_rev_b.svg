  <text x="25" y="300" class="note">Compact single chassis saddle mount: nominal 220 x 230 x 4.0 mm mild steel flat pattern, formed over the one known chassis rail location.</text><text x="25" y="312" class="note">Bend blue lines 90 degrees downward to make a saddle: 70 mm near leg, measured chassis top cap nominal 90 mm, 70 mm far leg. Adjust the cap width after measuring the rail.</text><text x="25" y="324" class="note">Through-bolt both saddle legs and the chassis rail as one pickup location. Final slot pitch, bolt size, and crush-tube need are site-fit only.</text><text x="25" y="336" class="note">Top-cap slots take the upright/service-rail bridge. Do not add an independent second chassis fixing unless dry-fit proves the single-pickup route is not stiff enough.</text><text x="25" y="348" class="note">Deburr, radius leg bottoms, prime, isolate from fretting with an anti-chafe pad where appropriate, and protect before final assembly.</text>
</svg>
