  <text x="25" y="210" class="note">Compact single chassis pickup mount: 220 x 140 x 4.0 mm mild steel base plate for the one known vehicle-side chassis attachment location.</text><text x="25" y="222" class="note">Chassis slots are site-fit only. Record the actual chassis hole pitch, metal thickness, and access before cutting final steel.</text><text x="25" y="234" class="note">Upright/service-rail slots take the carrier stand; do not add an independent second chassis fixing unless dry-fit proves the single-pickup route is not stiff enough.</text><text x="25" y="246" class="note">Use crush tubes/spacers if bolting through boxed structure. Deburr, prime, and protect before final assembly.</text>
