  <text x="25" y="200" class="note">Power module rear insulator: 3.0 mm ABS, HDPE, or polypropylene. Do not make this part from bare metal.</text><text x="25" y="212" class="note">Mount on 10-12 mm nylon spacers behind the power-module box to shield live studs while leaving a bottom drain gap.</text><text x="25" y="224" class="note">Bottom cable exits are radiused slots rather than sharp-edged notches to reduce loom abrasion.</text>
