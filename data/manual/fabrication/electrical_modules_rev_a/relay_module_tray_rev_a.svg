  <text x="25" y="330" class="note">Relay module tray: 3.0 mm 5052-H32 aluminium. Finished tray floor 320 x 220. Flanges 20 mm down.</text><text x="25" y="342" class="note">Relay slots are provisional image-derived pattern for DAIER RB-R10F10-W1; verify with actual box before final bend.</text><text x="25" y="354" class="note">Main loom opening is now a radiused slot to reduce chafing risk at the relay-box cable exit.</text><text x="25" y="366" class="note">All vehicle-side mount slots are intentionally generic for site-fit to the repaired tray/front rail/inner-wing structure.</text>
