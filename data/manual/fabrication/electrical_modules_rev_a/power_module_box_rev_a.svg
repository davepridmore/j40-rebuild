  <text x="25" y="250" class="note">Power module box: 3.0 mm 5052-H32 aluminium. Finished face 220 x 140. Flanges 20 mm back.</text><text x="25" y="262" class="note">Left slot pair is a universal MIDI mounting field for the grouped bank. Use clamp strips and M5 hardware after physical test-fit.</text><text x="25" y="274" class="note">Right slot pair is a universal breaker field. Confirm stud and hole geometry on the actual 100 A breaker before paint.</text><text x="25" y="286" class="note">Rear cover screw positions are now shown as true 4.5 mm circular holes rather than square placeholders.</text>
