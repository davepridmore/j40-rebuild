<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Hard-line shaping tool kit reference</title>
  <desc id="desc">Reference image showing a tube cutter, hand bender, deburrer, and flaring tool for brake, fuel, and clutch hard lines.</desc>
  <defs>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="900" height="600" rx="34" fill="#f8fafc"/>
  <rect x="44" y="44" width="812" height="512" rx="28" fill="#eef2f7" stroke="#cbd5e1" stroke-width="2"/>

  <g filter="url(#shadow)">
    <g transform="translate(110 116)">
      <circle cx="92" cy="92" r="61" fill="none" stroke="url(#blue)" stroke-width="22"/>
      <path d="M136 138 L230 232" stroke="#1d4ed8" stroke-width="22" stroke-linecap="round"/>
      <circle cx="92" cy="92" r="18" fill="#0f172a"/>
      <text x="0" y="300" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">hand bender</text>
    </g>

    <g transform="translate(418 128)">
      <rect x="10" y="118" width="236" height="40" rx="12" fill="url(#metal)" stroke="#475569" stroke-width="5"/>
      <rect x="38" y="60" width="180" height="58" rx="14" fill="#334155"/>
      <circle cx="72" cy="89" r="15" fill="#e2e8f0"/>
      <circle cx="128" cy="89" r="15" fill="#e2e8f0"/>
      <circle cx="184" cy="89" r="15" fill="#e2e8f0"/>
      <path d="M118 60 V14 H206" fill="none" stroke="#334155" stroke-width="18" stroke-linecap="round"/>
      <circle cx="224" cy="14" r="20" fill="#ef4444"/>
      <text x="30" y="300" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">flaring bar and yoke</text>
    </g>

    <g transform="translate(680 142)">
      <circle cx="60" cy="80" r="48" fill="url(#metal)" stroke="#475569" stroke-width="7"/>
      <circle cx="60" cy="80" r="24" fill="#eef2f7" stroke="#64748b" stroke-width="5"/>
      <path d="M96 113 L152 169" stroke="#475569" stroke-width="20" stroke-linecap="round"/>
      <text x="-24" y="286" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">tube cutter</text>
    </g>
  </g>

  <path d="M116 448 C260 398 418 413 545 455 C656 493 747 485 813 428" fill="none" stroke="#d97706" stroke-width="16" stroke-linecap="round"/>
  <path d="M116 448 C260 398 418 413 545 455 C656 493 747 485 813 428" fill="none" stroke="#fde68a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <g font-family="Inter, Arial, sans-serif" fill="#0f172a">
    <text x="72" y="82" font-size="24" font-weight="700">required if shaping metal pipe or hard lines in-house</text>
    <text x="72" y="534" font-size="20" fill="#475569">Confirm the old flare/thread style first. A qualified hydraulic/pipe shop can replace this tool requirement.</text>
  </g>
</svg>
