<svg xmlns="http://www.w3.org/2000/svg" width="900" height="675" viewBox="0 0 900 675" role="img" aria-labelledby="title desc">
  <title id="title">Complete EPS column set reference</title>
  <desc id="desc">Checklist-style reference showing the full donor EPS set required for purchase: motorized column, matched EPS ECU controller, plugs with pigtails, upper and lower shafts, U-joints, couplers, brackets, support plates, fasteners, and labels.</desc>
  <rect width="900" height="675" fill="#f7f7f2"/>
  <rect x="28" y="28" width="844" height="619" rx="8" fill="#ffffff" stroke="#202020" stroke-width="3"/>
  <text x="56" y="78" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#202020">EPS complete matched donor set</text>
  <text x="56" y="114" font-family="Arial, sans-serif" font-size="19" fill="#404040">Buy only if the seller lays out all required pieces together and bench-tests the matched controller.</text>

  <g transform="translate(70 165)">
    <rect x="0" y="0" width="478" height="126" rx="12" fill="#eef3f4" stroke="#3e5960" stroke-width="3"/>
    <rect x="26" y="44" width="300" height="22" rx="11" fill="#bac7ca" stroke="#3e5960" stroke-width="2"/>
    <rect x="318" y="22" width="104" height="70" rx="10" fill="#d9d0c1" stroke="#5d5549" stroke-width="3"/>
    <circle cx="424" cy="56" r="32" fill="#2f3437" stroke="#111111" stroke-width="3"/>
    <circle cx="424" cy="56" r="12" fill="#777f83"/>
    <rect x="120" y="72" width="46" height="34" rx="8" fill="#e9ece7" stroke="#5d5549" stroke-width="2"/>
    <text x="28" y="115" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Motorized EPS column, torque sensor and reduction housing</text>
  </g>

  <g transform="translate(612 156)">
    <rect x="0" y="0" width="200" height="152" rx="12" fill="#22282c" stroke="#111111" stroke-width="3"/>
    <rect x="22" y="22" width="156" height="58" rx="6" fill="#d7d7cf" stroke="#73736b" stroke-width="2"/>
    <text x="38" y="58" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#202020">EPS ECU</text>
    <rect x="28" y="102" width="48" height="24" rx="4" fill="#3c6b8e"/>
    <rect x="84" y="102" width="40" height="24" rx="4" fill="#6d3f7e"/>
    <rect x="132" y="102" width="40" height="24" rx="4" fill="#9f5a2d"/>
    <text x="0" y="184" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Matched EPS ECU/controller</text>
    <text x="0" y="210" font-family="Arial, sans-serif" font-size="16" fill="#404040">Not the J40 engine ECU.</text>
  </g>

  <g transform="translate(78 348)" stroke="#384247" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="0" y1="22" x2="190" y2="22"/>
    <circle cx="208" cy="22" r="18" fill="#d5d2c8" stroke="#384247" stroke-width="4"/>
    <line x1="226" y1="22" x2="392" y2="22"/>
    <circle cx="410" cy="22" r="18" fill="#d5d2c8" stroke="#384247" stroke-width="4"/>
    <line x1="428" y1="22" x2="562" y2="22"/>
  </g>
  <text x="78" y="418" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Upper and lower intermediate shafts, U-joints and couplers</text>

  <g transform="translate(78 468)">
    <rect x="0" y="0" width="156" height="78" rx="8" fill="#e6ebea" stroke="#536467" stroke-width="3"/>
    <rect x="184" y="0" width="156" height="78" rx="8" fill="#e6ebea" stroke="#536467" stroke-width="3"/>
    <rect x="368" y="0" width="156" height="78" rx="8" fill="#e6ebea" stroke="#536467" stroke-width="3"/>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Brackets</text>
    <text x="204" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Support plate</text>
    <text x="388" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Fasteners</text>
  </g>

  <g transform="translate(650 390)">
    <path d="M0 0 C30 20 64 20 96 0 S160 -20 200 4" fill="none" stroke="#b4532a" stroke-width="8" stroke-linecap="round"/>
    <path d="M0 36 C34 58 72 58 110 34 S174 10 220 40" fill="none" stroke="#2f6590" stroke-width="8" stroke-linecap="round"/>
    <path d="M0 72 C38 98 80 96 122 68 S180 48 228 82" fill="none" stroke="#2f7a50" stroke-width="8" stroke-linecap="round"/>
    <rect x="236" y="-12" width="54" height="32" rx="5" fill="#30363a"/>
    <rect x="236" y="26" width="54" height="32" rx="5" fill="#30363a"/>
    <rect x="236" y="64" width="54" height="32" rx="5" fill="#30363a"/>
    <text x="0" y="134" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Original plugs with 150 mm+ pigtails</text>
  </g>

  <g transform="translate(56 596)">
    <rect x="0" y="-30" width="788" height="46" rx="8" fill="#fff3cd" stroke="#8a6d1e" stroke-width="2"/>
    <text x="20" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202020">Reject partial kits: no bare column, no loose motor, no random ECU, no cut-flush connectors.</text>
  </g>
</svg>
